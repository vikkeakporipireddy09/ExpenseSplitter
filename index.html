<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Splitter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- PIN Lock Screen -->
  <div class="pin-lock" id="pin-lock">
    <h2>Enter PIN to Access</h2>
    <input type="password" id="pin-input" placeholder="4-digit PIN" maxlength="4" />
    <button onclick="verifyPin()">Unlock</button>
  </div>

  <!-- Main App Container -->
  <div class="container hidden" id="main-app">
    <h1>💸 Expense Splitter</h1>

    <!-- Section: Add Member -->
    <section class="card">
      <h2>Add Members</h2>
      <input type="text" id="member-name" placeholder="Enter member name" />
      <button onclick="addMember()">Add Member</button>
      <ul id="members-list"></ul>
    </section>

    <!-- Section: Add Expense -->
    <section class="card">
      <h2>Add Expense</h2>
      <input type="text" id="expense-desc" placeholder="Expense description" />
      <input type="number" id="expense-amount" placeholder="Amount (₹)" />
      <select id="paid-by">
        <option value="">-- Paid By --</option>
      </select>
      <button onclick="addExpense()">Add Expense</button>
    </section>

    <!-- Section: Balance Summary -->
    <section class="card">
      <h2>Balance Summary</h2>
      <ul id="balance-summary"></ul>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
